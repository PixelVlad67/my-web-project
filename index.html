<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Мій професійний блог</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Мій професійний блог</h1>
    <button id="theme-toggle">Змінити тему</button>
    <nav>
      <a href="#home">Головна</a>
      <a href="#articles">Статті</a>
      <a href="#contact">Контакти</a>
    </nav>
  </header>

  <main>
  <section id="app-container" style="margin-top: 40px;">
    <h2>Фінальний міні-застосунок</h2>
    
    <input type="text" id="search-input" placeholder="Пошук по постах...">
    
    <p id="loading">Завантаження...</p>
    
    <div id="posts-container"></div>
  </section>
</main>
<button id="open-modal">Контакти</button>

<div id="modal" class="modal">
  <div class="modal-content">
    <button id="close-modal">Закрити</button>
    <form id="contact-form">
      <input type="text" id="user-name" placeholder="Ваше ім'я">
      <button type="submit">Надіслати</button>
    </form>
  </div>
</div>
  <footer>
    <p>© 2026 Моє ім'я</p>
  </footer>
<script src="script.js"></script>

</body>
</html>
